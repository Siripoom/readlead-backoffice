services:
  postgres:
    image: postgres:16-alpine
    container_name: readlead_postgres
    environment:
      POSTGRES_USER: readlead
      POSTGRES_PASSWORD: readlead
      POSTGRES_DB: readlead_backoffice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: readlead_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@readlead.com
      PGADMIN_DEFAULT_PASSWORD: readlead
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
